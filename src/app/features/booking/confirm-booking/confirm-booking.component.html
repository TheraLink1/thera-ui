<div class="page">
  @if (loading) {
    <p>Ładowanie...</p>
  } @else {
    <div class="booking-card">
      <h5 class="booking-title">Potwierdzenie wizyty</h5>
      <p class="booking-row"><strong>Data:</strong> {{ date }}</p>
      <p class="booking-row"><strong>Godzina:</strong> {{ time }}</p>
      @if (psychologist) {
        <p class="booking-row"><strong>Psycholog:</strong> {{ psychologist.name }}</p>
        <p class="booking-row"><strong>Specjalizacja:</strong> {{ psychologist.Specialization }}</p>
      } @else {
        <p class="booking-error">Nie znaleziono psychologa o podanym identyfikatorze.</p>
      }
      <div class="booking-field">
        <label class="booking-label">Opisz swój problem</label>
        <textarea
          class="booking-textarea"
          rows="4"
          [(ngModel)]="description"
          name="description"
        ></textarea>
      </div>
      <button class="booking-btn" (click)="confirm()" [disabled]="!canConfirm">
        Potwierdź wizytę
      </button>
    </div>
  }
</div>
